<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lumina — App Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0b1326; color: #dae2fd; font-family: 'Manrope', sans-serif; }
  body { min-height: 100vh; }
  ::selection { background: rgba(139,92,246,0.4); color: #fff; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0b1326; }
  ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.20); border-radius: 5px; border: 2px solid #0b1326; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.35); }
  button { font-family: inherit; }
  button:hover { filter: brightness(1.1); }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
